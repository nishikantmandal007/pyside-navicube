title: NavCube
description: A 3D orientation cube widget for PySide6 — renderer-agnostic, drop-in ready
url: "https://nishikantmandal007.github.io"
baseurl: "/navcube"

remote_theme: JV-conseil/jekyll-theme-read-the-docs

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Sidebar navigation
nav:
  - Home: /
  - Getting Started: /getting-started/
  - API Reference: /api-reference/
  - Coordinate Systems: /coordinate-systems/
  - Connectors: /connectors/
  - Examples: /examples/
  - Style Reference: /style-reference/
  - Changelog: /changelog/

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
