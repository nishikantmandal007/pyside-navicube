site_name: NavCube
site_description: A 3D orientation cube widget for PySide6 — renderer-agnostic, drop-in ready
site_url: https://nishikantmandal007.github.io/navcube/
repo_url: https://github.com/nishikantmandal007/navcube
repo_name: nishikantmandal007/navcube
edit_uri: ""

docs_dir: docs
site_dir: _site

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Connectors: connectors.md
  - Style Reference: style-reference.md
  - Coordinate Systems: coordinate-systems.md
  - Examples: examples.md
  - API Reference: api-reference.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nishikantmandal007/navcube
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/navcube/
