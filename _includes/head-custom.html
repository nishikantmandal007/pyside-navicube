<link rel="icon" type="image/svg+xml" href="{{ '/assets/logo.svg' | relative_url }}">

<!-- Copy-to-clipboard for code blocks -->
<style>
  .code-block-wrapper { position: relative; }
  .copy-btn {
    position: absolute; top: 0.5rem; right: 0.5rem;
    background: #444; color: #fff; border: none; border-radius: 4px;
    padding: 3px 10px; font-size: 0.75rem; cursor: pointer;
    opacity: 0; transition: opacity 0.15s; z-index: 10;
  }
  .code-block-wrapper:hover .copy-btn { opacity: 1; }
  .copy-btn.copied { background: #2a9a5e; }

  /* ── CAD viewer frame ─────────────────────────────── */
  .cad-frame {
    border: 1px solid #3a3e4a;
    border-radius: 6px;
    overflow: hidden;
    margin: 1.2rem 0 1.5rem;
    background: #1e2029;
    box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .cad-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 30px;
    background: #23262f;
    border-color: #3a3e4a;
    font-size: 11px;
    color: #8a8fa0;
    user-select: none;
  }
  .cad-bar-top  { border-bottom: 1px solid #3a3e4a; }
  .cad-bar-bottom { border-top: 1px solid #3a3e4a; }
  .cad-bar-left, .cad-bar-right { display: flex; align-items: center; gap: 10px; }
  .cad-viewport-badge {
    background: #2e5fa3;
    color: #ccd6f6;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10.5px;
    letter-spacing: 0.02em;
  }
  .cad-hint-text { color: #666c80; font-size: 10.5px; }
  .cad-status-left  { color: #a0c4ff; font-size: 10.5px; }
  .cad-status-right { color: #555b6e; font-size: 10.5px; }
  #demo-canvas { display: block; }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("pre").forEach(function (pre) {
      var wrapper = document.createElement("div");
      wrapper.className = "code-block-wrapper";
      pre.parentNode.insertBefore(wrapper, pre);
      wrapper.appendChild(pre);
      var btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      wrapper.appendChild(btn);
      btn.addEventListener("click", function () {
        var code = pre.querySelector("code");
        var text = code ? code.innerText : pre.innerText;
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(function () { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
        }).catch(function () {
          btn.textContent = "Failed";
          setTimeout(function () { btn.textContent = "Copy"; }, 2000);
        });
      });
    });
  });
</script>
